      </h1>

      <!-- Manager Specific Navigation Links -->
      <ul class="navbar-nav ms-lg-4 gap-lg-3 align-items-lg-center">
        
        <li class="nav-item">

        <!-- Projects Dropdown (Manager Specific) -->
        <li class="nav-item dropdown">
          <a class="nav-link text-secondary dropdown-toggle fw-semibold" role="button"

          </a>

          <a class="nav-link fw-semibold text-secondary" routerLink="/manager/view-requirement">

<!-- Logout Confirmation Popup (Design preserved) -->
<div
  class="position-fixed top-0 start-0 w-100 h-100
         bg-dark bg-opacity-75
         d-flex justify-content-center align-items-center"
  *ngIf="showLogoutConfirmPopup"
  style="z-index: 2000; backdrop-filter: blur(4px);">

  <div class="card border-0 shadow-lg rounded-4 text-center px-4 py-4"
       style="width: 340px;">

    <div class="mb-3">
      <i class="bi bi-box-arrow-right text-danger fs-1"></i>
    </div>

    <h5 class="fw-bold mb-2 text-dark">Confirm Logout</h5>
    <p class="text-muted mb-4">
      Are you sure you want to end your session?
    </p>

    <div class="d-flex gap-3">
      <button type="button"
              class="btn btn-outline-secondary flex-grow-1 rounded-pill fw-semibold"
              (click)="closeLogoutPopup()">
        <i class="bi bi-x-circle me-1"></i> Cancel
      </button>

      <button type="button"
              class="btn btn-danger flex-grow-1 rounded-pill fw-semibold shadow-sm"
              (click)="confirmLogout()">
        <i class="bi bi-power me-1"></i> Logout
      </button>
    </div>
  </div>
</div>
